name: Buf CI

on:
  pull_request:
    paths:
      - "**/*.proto"
      - "buf.yaml"
      - "buf.lock"
      - "buf.gen.yaml"
      - "Makefile"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/**"
  push:
    branches:
      - main
    paths:
      - "**/*.proto"
      - "buf.yaml"
      - "buf.lock"
      - "buf.gen.yaml"
      - "Makefile"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/**"

permissions:
  contents: write

jobs:
  buf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'true'
      - uses: bufbuild/buf-action@v1
        with:
          token: ${{ secrets.BUF_TOKEN }}
          pr_comment: false

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod   

      - name: lint
        run: make buf

      - name: protoc-nats-micro
        run: make protoc-nats  

      - name: build
        run: make generate
