syntax = "proto3";

option go_package = "github.com/roundinternetmoney/proto-dex;pb";

package ethereal.v1;

enum Side {
    SIDE_UNSPECIFIED = 0;
    SIDE_BUY = 1; // offer with bids
    SIDE_SELL = 2; // offer with asks
}

enum OrderType {
    ORDER_TYPE_UNSPECIFIED = 0;
    ORDER_TYPE_LIMIT = 1; // limit
    ORDER_TYPE_MARKET = 2; // market
}
