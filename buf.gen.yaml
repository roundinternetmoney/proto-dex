version: v2
managed:
  enabled: true
plugins:
  - local: protoc-gen-go
    out: gen
    opt: paths=source_relative
  - local: ./protoc-nats/tools/protoc-gen-nats-micro/protoc-gen-nats-micro
    out: gen
    opt: paths=source_relative    
inputs:
  - directory: .
    exclude_paths:
      - protoc-nats/**/*.proto